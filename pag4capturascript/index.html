<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teste de webhook</title>
</head>
<body>
    <h1><a href="../pag1capturawidget/index.html">Voltar para o teste de widget modal</a></h1>

    <button id="btnEnviar">Testar Envio via Fetch (POST)</button>

    <script>
        document.getElementById('btnEnviar').addEventListener('click', async () => {
            console.log("Disparando Fetch...");

            try {
                const response = await fetch('https://api.clickmax.io/ingest/h4p6oDOmYPt__dNBDIyR7cDW', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'lead@example.com',
                        name: 'Maria',
                        telephone: '5511999999999',
                        utmSource: 'meta',
                        utmCampaign: 'capture-widget'
                    })
                });

                if (!response.ok) {
                    // Se o status não for 2xx (ex: 400, 403, 500)
                    const errorDetail = await response.text();
                    throw new Error(`Erro na requisição: ${response.status} - ${errorDetail}`);
                }

                const payload = await response.json();
                console.log("Sucesso! ID do Lead:", payload.leadId);
                alert("Lead enviado com sucesso! ID: " + payload.leadId);

            } catch (error) {
                console.error("Falha no envio:", error);
            }
        });
    </script>
</body>
</html>
